# Action refs below use major-version tags (e.g. `actions/checkout@v4`), which are
# valid `uses:` syntax (DR-006). Do NOT flag these as invalid versions, fabricated
# file paths, or nonexistent releases. Major-tag pinning is an intentional choice
# here; do NOT raise SHA-pinning as a Critical/High/Medium hardening finding.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
