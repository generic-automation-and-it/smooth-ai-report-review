# LLM Eval Harness for the chunk-review model.
#
# Scores the chunk-review LLM (the gate's blocking-findings call) against a
# labeled corpus on two axes — precision (must-NOT-flag / the DR golden set) and
# recall (must-catch / seeded real defects) — so prompt/model/LADR changes can be
# regression-tested. See LADR-033 in .agents/skills/ai-review-report/SKILL.md.
#
# *** MAKES REAL, PAID MODEL CALLS — manual only (workflow_dispatch). It is NOT
#     wired to pull_request and is NOT part of the default bash-test path. ***
#
# Workflow↔script path coupling (repo Non-Negotiable): this file invokes the
# harness by hardcoded path (.agents/skills/ai-review-report/scripts/eval/...).
# Moving/renaming the harness scripts requires editing this file in the same commit.
name: LLM Eval Harness

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider: GEMINI | COPILOT | OPENAI | OPENCODE-GO-OPENAI | OPENCODE-GO-ANTHROPIC (blank = repo Variable / GEMINI)"
        required: false
        type: string
      model:
        description: "Chunk-review model under eval (blank = Variable / default)"
        required: false
        type: string
      recall_threshold:
        description: "Min must-catch catch-rate %% to pass"
        required: false
        type: string
        default: "80"
      samples:
        description: "Runs per fixture (1 = single-shot; >1 = precision worst-case, recall majority)"
        required: false
        type: string
        default: "1"
      filter:
        description: "Only run fixtures whose id contains this substring (blank = all)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  llm-evals:
    # Network-bound (chunked <100KB/call); the selected provider endpoint must be
    # publicly reachable from GitHub-hosted runners (repo Non-Negotiable). Switch
    # to self-hosted only if a private-network endpoint is ever used.
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Provider selector — dispatch input wins, else repo Variable, else GEMINI.
      # Same OPENCODE_REVIEW_REPORT_* Variables/Secrets the review gate uses, so the
      # eval exercises the DESIGNED models (not a hardcoded chain).
      OPENCODE_REVIEW_REPORT_PROVIDER: ${{ github.event.inputs.provider || vars.OPENCODE_REVIEW_REPORT_PROVIDER || 'GEMINI' }}
      # All provider credential pairs at job scope so opencode.json's
      # {env:OPENCODE_*} substitution resolves for whichever provider is selected.
      # API keys = Secrets (un-prefixed); gateway URLs = OPENCODE_REVIEW_REPORT_*
      # Variables (retunable). The two OpenCode Go surfaces have no URL var (fixed
      # public Zen base).
      OPENCODE_GEMINI_API_KEY: ${{ secrets.OPENCODE_GEMINI_API_KEY }}
      OPENCODE_REVIEW_REPORT_GEMINI_URL: ${{ vars.OPENCODE_REVIEW_REPORT_GEMINI_URL }}
      OPENCODE_COPILOT_API_KEY: ${{ secrets.OPENCODE_COPILOT_API_KEY }}
      OPENCODE_REVIEW_REPORT_COPILOT_URL: ${{ vars.OPENCODE_REVIEW_REPORT_COPILOT_URL }}
      OPENCODE_OPENAI_API_KEY: ${{ secrets.OPENCODE_OPENAI_API_KEY }}
      OPENCODE_REVIEW_REPORT_OPENAI_URL: ${{ vars.OPENCODE_REVIEW_REPORT_OPENAI_URL }}
      OPENCODE_GO_OPENAI_API_KEY: ${{ secrets.OPENCODE_GO_OPENAI_API_KEY }}
      OPENCODE_GO_ANTHROPIC_API_KEY: ${{ secrets.OPENCODE_GO_ANTHROPIC_API_KEY }}
      # Model chain — dispatch input overrides PRIMARY. SECONDARY/ORCHESTRATOR are
      # optional; run-evals.sh defaults blanks to PRIMARY so non-GEMINI dispatches
      # do not inherit Gemini literals from the review gate.
      OPENCODE_REVIEW_REPORT_MODEL_PRIMARY: ${{ github.event.inputs.model || vars.OPENCODE_REVIEW_REPORT_MODEL_PRIMARY || 'gemini-3.1-pro-preview' }}
      OPENCODE_REVIEW_REPORT_MODEL_SECONDARY: ${{ vars.OPENCODE_REVIEW_REPORT_MODEL_SECONDARY || '' }}
      OPENCODE_REVIEW_REPORT_MODEL_ORCHESTRATOR: ${{ vars.OPENCODE_REVIEW_REPORT_MODEL_ORCHESTRATOR || '' }}
      OPENCODE_REVIEW_REPORT_CLI_VERSION: ${{ vars.OPENCODE_REVIEW_REPORT_CLI_VERSION || '' }}
      # Disable Claude Code (.claude) support to avoid conflicts with opencode.
      OPENCODE_REVIEW_REPORT_DISABLE_CLAUDE_CODE: ${{ vars.OPENCODE_REVIEW_REPORT_DISABLE_CLAUDE_CODE || '1' }}
      OPENCODE_DISABLE_CLAUDE_CODE: ${{ vars.OPENCODE_REVIEW_REPORT_DISABLE_CLAUDE_CODE || '1' }}
      # Eval config (from dispatch inputs; run-evals.sh has its own defaults).
      EVAL_RECALL_THRESHOLD: ${{ github.event.inputs.recall_threshold || '80' }}
      EVAL_SAMPLES: ${{ github.event.inputs.samples || '1' }}
      EVAL_FILTER: ${{ github.event.inputs.filter || '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install opencode
        run: |
          set -e
          export PATH="$HOME/.opencode/bin:$HOME/.local/bin:$PATH"
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          PIN="${OPENCODE_REVIEW_REPORT_CLI_VERSION#v}"
          if [ -n "$PIN" ]; then
            VERSION="$PIN" OPENCODE_REVIEW_REPORT_CLI_VERSION="$PIN" curl -fsSL https://opencode.ai/install | bash
          else
            curl -fsSL https://opencode.ai/install | bash
          fi
          command -v opencode >/dev/null 2>&1 || { echo "❌ opencode not available after install."; exit 1; }
          opencode stats >/dev/null 2>&1 || true   # warm the SQLite store
          echo "✓ opencode ready ($(opencode --version || echo unknown))"

      - name: Run LLM evals
        # run-evals.sh sources lib/resolve-provider.sh (resolves provider-id +
        # creds, fails fast on a bad model chain), installs the managed
        # opencode.json (setup-opencode-config.sh), runs the provider-agnostic
        # health check (opencode-health.sh), then drives review-in-chunks.sh per
        # fixture and scores. Non-zero exit on a precision regression, recall
        # below threshold, or infra failure → the job fails (the regression gate).
        run: |
          set -e
          bash .agents/skills/ai-review-report/scripts/eval/run-evals.sh
