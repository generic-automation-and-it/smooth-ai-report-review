name: Publish npm package

# Publishes the opencode plugin @generic-automation-and-it/smooth-ai-review to
# the GitHub Packages npm registry (npm.pkg.github.com) on every push to main,
# when run manually, or on semver release tags (vX.Y.Z). The floating `v1` tag
# used to pin the reusable review workflow deliberately does NOT match this
# pattern, so re-pointing it never re-publishes. Semver tags still assert that
# the tag and package metadata agree.
#
# Trigger keys on VERSION, not changed paths. npm is immutable, so non-tag runs
# patch package.json/.claude-plugin/plugin.json at workflow runtime to
# major.minor.${GITHUB_RUN_NUMBER}; semver tag runs keep the checked-in/tagged
# version exactly. Deliberately NO `paths:` filter — it would miss release
# commits whose only change is the version bump outside .agents/skills/**.
# Runtime run-number patching makes a path filter redundant anyway, including
# for semver tag pushes where GitHub does not evaluate path filters.
#
# Auth: the run-scoped GITHUB_TOKEN with `packages: write` — no PAT or npm.com
# token needed. Note GitHub Packages requires consumers to authenticate with a
# read:packages PAT even for public packages (documented in the README).
#
# One-time after the FIRST publish: the package starts private — flip it to
# public under the org's Packages → package settings → Danger Zone.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@generic-automation-and-it"

      # package.json and .claude-plugin/plugin.json must agree — the npm package
      # and the Claude Code plugin are versioned in lockstep. Semver tag releases
      # additionally assert that the tag carries the same version.
      - name: Assert package metadata version lockstep
        run: |
          set -euo pipefail
          pkg_version="$(node -p "require('./package.json').version")"
          plugin_version="$(node -p "require('./.claude-plugin/plugin.json').version")"
          echo "package.json=${pkg_version} plugin.json=${plugin_version}"
          if [ "${pkg_version}" != "${plugin_version}" ]; then
            echo "::error::Version mismatch: package.json and .claude-plugin/plugin.json must both be ${pkg_version}." >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            echo "tag=${tag_version}"
            if [ "${tag_version}" != "${pkg_version}" ]; then
              echo "::error::Version mismatch: tag v${tag_version} requires package.json and .claude-plugin/plugin.json to both be ${tag_version}." >&2
              exit 1
            fi
          fi

      - name: Patch non-tag publish version
        run: |
          set -euo pipefail
          base_version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            publish_version="${base_version}"
            echo "Semver tag publish: keeping ${publish_version}."
          else
            if [[ ! "${base_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "::error::Non-tag publishes require package.json version to be plain semver X.Y.Z; found ${base_version}." >&2
              exit 1
            fi
            publish_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${GITHUB_RUN_NUMBER}"
            echo "Non-tag publish: patching ${base_version} -> ${publish_version} using GITHUB_RUN_NUMBER=${GITHUB_RUN_NUMBER}."
            PUBLISH_VERSION="${publish_version}" node -e 'const fs = require("fs"); const version = process.env.PUBLISH_VERSION; for (const path of ["package.json", ".claude-plugin/plugin.json"]) { const data = JSON.parse(fs.readFileSync(path, "utf8")); data.version = version; fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`); }'
          fi
          echo "publish_version=${publish_version}" >> "$GITHUB_ENV"

      - name: Check published version
        id: published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pkg_name="$(node -p "require('./package.json').name")"
          pkg_version="$(node -p "require('./package.json').version")"
          if npm view "${pkg_name}@${pkg_version}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${pkg_name}@${pkg_version} is already published; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        if: steps.published.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
